# funding_carry_config.yml
# ─────────────────────────────────────────────────────────────────────────────
# Place this file in Hummingbot's conf/scripts/ directory.
# Start the strategy with: start --script funding_carry_strategy.py --conf funding_carry_config.yml
#
# CONNECTORS
# Both connectors must be set up and paper-traded first.
# Run `connect binance` and `connect binance_perpetual` in Hummingbot before starting.
# ─────────────────────────────────────────────────────────────────────────────

# Which exchanges to use for each leg
spot_connector: binance
perp_connector: binance_perpetual

# Asset to trade — the strategy opens equal-sized spot + perp positions
trading_pair: ETH-USDT

# Total USD value of each leg (spot AND perp each get this size)
# $1000 means $1000 spot long + $1000 perp short = $2000 total notional, $0 net delta
position_size_usd: "1000"

# How often to check signals, in seconds (default: 4h, before each funding window)
# Set lower during testing — e.g. 300 = check every 5 minutes
signal_interval_seconds: 14400

# Stellar secret key for AgentPay signal payments
# Cost: ~$0.008 USDC per check ($0.024/day at 4h intervals)
stellar_secret_key: "S..."
