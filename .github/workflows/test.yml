name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          # Hermetic test invariants — match the local smoke test pattern.
          # KEEPALIVE_DISABLED prevents the gateway's background ping from
          # firing during TestClient lifespan; SUPABASE_URL/KEY are blanked
          # so the startup hook early-returns instead of hitting the network.
          KEEPALIVE_DISABLED: "1"
          SUPABASE_URL: ""
          SUPABASE_KEY: ""
        run: pytest -v --tb=short
